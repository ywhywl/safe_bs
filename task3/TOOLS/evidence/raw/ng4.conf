# ng4 - 带流量监控的 Nginx 配置
# 来源: ng4.png
# worker_processes 1, vhost_traffic_status

user nobody;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    vhost_traffic_status_zone;
    vhost_traffic_status_filter_by_host on;
    include mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;

    log_format main '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_x_forwarded_host|[2]WEB-NGINX]|main';

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /data/ssl/nginx/cert/nxuc.com.crt;
        ssl_certificate_key /data/ssl/nginx/cert/nxuc.com.key;
        ssl_protocols TLSv1.2;
        ssl_ciphers HIGH:ECDHE:!NULL:!MD5:!AES256-SHA:!AES128-SHA:!ECDHE-RSA-AES256-SHA:!ECDHE-RSA-AES128-SHA:!CAMELLIA128-SHA:!CAMELLIA256-SHA;

        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format html;
            allow 10.0.0.1;
            deny all;
        }

        location /vstatus {
            check_status;
            access_log off;
            allow 10.0.0.1;
            deny all;
        }
    }
}