# ng5 - 带 nuaclmt 日志格式的 Nginx 配置
# 来源: ng5.png
# worker_processes 4, vhost_traffic_status, log_escape_char

user nobody;
worker_processes 4;

events {
    worker_connections 1024;
}

http {
    vhost_traffic_status_zone;
    vhost_traffic_status_filter_by_host on;
    include mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_escape_char '{' "%7C";

    return off;

    log_format nuaclmt escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host';

    keepalive_timeout 65;
    gzip on;
    sendfile on;

    server {
        listen 8080;
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /data/ssl/nginx/cert/nxuc.com.crt;
        ssl_certificate_key /data/ssl/nginx/cert/nxuc.com.key;
        ssl_protocols TLSv1.2;
        ssl_ciphers HIGH:ECDHE:!NULL:!MD5:!AES256-SHA:!AES128-SHA:!ECDHE-RSA-AES256-SHA:!ECDHE-RSA-AES128-SHA:!CAMELLIA128-SHA:!CAMELLIA256-SHA;

        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format html;
            allow 10.0.0.1;
            deny all;
        }
    }
}