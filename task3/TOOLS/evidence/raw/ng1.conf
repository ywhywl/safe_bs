# ng1 - 主应用 Nginx 配置 (Web-NGINX)
# 来源: ng1_1.jpg ~ ng1_6.jpg + ng2.png (子文件)
# 监听端口: 8080(HTTP), 8443(HTTPS 主应用), 9093(HTTPS dispute), 8443(HTTPS dispute)

# --- http 块全局部分 (ng1_2) ---
log_format application_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_host|[2]WEB-NGINX|application';
log_format dispute_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|dispute';
log_format datahub_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|datahub';
log_format reserve_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|reserve';
log_format with_manager_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|with-manager';
log_format unionpay_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|unionpay';
log_format invert_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|invert';
error_log /data/appLogs/error.log main;
sendfile on;
tcp_nopush on;
keepalive_timeout 65;
tcp_nodelay on;
gzip on;
allow 10.0.0.1;
allow 10.0.0.2;
allow 10.0.0.3;
deny all;
lua_package_path '/data/lua/?.lua;;';
lua_shared_dict session_cache 10m;

# --- upstream (ng1_3) ---
upstream platform.http {
    ip_hash;
    server 10.0.0.1:8080;
    server 10.0.0.2:8080;
    server 10.0.0.3:8080;
    check interval=3000 rise=3 fall=5 timeout=1000 type=http;
    check_http_send "HEAD /SSL/healthcheck.html HTTP/1.0\r\nHost:\r\n\r\n";
    check_http_expect_alive http_2xx http_3xx;
}

upstream platform.https.node {
    ip_hash;
    server 10.0.0.2:8443;
    server 10.0.0.2:8443;
    server 10.0.0.3:8443;
    check interval=3000 rise=3 fall=5 timeout=1000 type=http port=8080;
    check_http_send "HEAD /SSL/healthcheck.html HTTP/1.0\r\nHost:\r\n\r\n";
    check_http_expect_alive http_2xx http_3xx;
}

# --- HTTP server 8080 (ng1_2) ---
server {
    listen 8080;
    server_name localhost;
    location /healthcheck.html {
        return 200;
    }
}

# --- HTTPS server 8443 (ng1_5, ng1_6, ng1_1) ---
server {
    listen 8443 ssl;
    server_name localhost;
    ssl_protocols TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5:!AES256-SHA:!AES128-SHA:!ECDHE-RSA-AES256-SHA:!ECDHE-RSA-AES128-SHA:!CAMELLIA128-SHA:!CAMELLIA256-SHA;
    ssl_certificate /tools/cert/https.cer;
    ssl_certificate_key /tools/cert/https.key;
    client_max_body_size 20m;
    proxy_redirect http:// https://;
    proxy_redirect koil-r;
    access_by_lua_block { require("aa").validate_session() }
    proxy_cookie_path / "/; HTTPOnly";
    if ($request_method = OPTIONS) {
        return 403;
    }

    location / {
        return 302 /404.html;
    }

    location =/healthcheck.html {
        return 200;
    }

    location =/ {
        absolute_redirect off;
        rewrite ^/(.*) /portal/index.html redirect;
    }
    location =/portal {
        absolute_redirect off;
        rewrite ^/(.*) /portal/index.html redirect;
    }

    location /feHealthcheck {
        alias /data/static;
        access_log /data/appLogs/access.log acc_log;
    }

    location /application/common {
        alias /data/static/applicationFeTemp/common;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /health_status {
        check_status;
        access_log off;
        allow 10.0.0.1;
        deny all;
    }

    location /commonNgStatic/ {
        alias /data/html/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        limit_rate 1M;
        add_header Cache-Control max-age=3600000000;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    #error_page 404 /404.html;
    error_page 404 /404.html;
    location = /404.html {
        root html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root html;
    }

    location = /SSL/healthcheck.html {
        root html;
        access_log off;
    }

    location /application/page/orgapplication/msgActivateList.html {
        alias /data/static/single-page-app/message/msgActivateList.html;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /application/page/orgapplication/msgDetail.html {
        alias /data/static/single-page-app/message/msgDetail.html;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /application/page/orgapplication/msgExecution.html {
        alias /data/static/single-page-app/message/msgExecution.html;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /application/page/orgapplication/msgTaskList.html {
        alias /data/static/single-page-app/message/msgTaskList.html;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /portal {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        alias /data/static/orgapplication-fe;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /lei {
        proxy_pass https://application.https.node;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log /data/appLogs/access.log application_log;
    }

    location /application/merchant/merchantUpload {
        absolute_redirect off;
        if ($http_cookie ~* "org_code=Z2015911000014") {
            rewrite ^/(.*) /maintain/noAuth.html redirect;
        }
        if ($http_cookie ~* "org_code=C9999999999002") {
            rewrite ^/(.*) /maintain/noAuth.html redirect;
        }
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        root /data/html/apps;
        add_header Static-Origin "web-nginx";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log /data/appLogs/access.log application_log;
        try_files $uri $uri/ @proxy;
    }

    location /application/gateway/orgapplication/merchant {
        absolute_redirect off;
        if ($http_cookie ~* "org_code=Z2015911000014") {
            rewrite ^/(.*) /maintain/noAuth.html redirect;
        }
    }
}

# --- dispute 子配置 (ng2.png, include 文件) ---
server {
    listen 9093 ssl;
    server_name ;
    if ($time_iso8603 ~ "^(d{4})-(d{2})-(d{2})T") {
        set $year $1;
        set $month $2;
        set $day $3;
    }

    access_log /data/logs/nginx/dispute.access.log nuaclmt;
    error_log /data/logs/nginx/dispute.error.log;
    ssl_certificate /data/ssl/nginx/cert/nxuc.com.crt;
    ssl_certificate_key /data/ssl/nginx/cert/nxuc.com.key;
    location / {
        proxy_redirect http:// https://;
        proxy_set_header Host $http_host;
        proxy_pass https://api.nxuc.com:8443;
    }
}

server {
    listen 8443 ssl;
    server_name ;
    if ($time_iso8603 ~ "^(d{4})-(d{2})-(d{2})T") {
        set $year $1;
        set $month $2;
        set $day $3;
    }

    access_log /data/logs/nginx/dispute.access.log nuaclmt;
    error_log /data/logs/nginx/dispute.error.log;
    ssl_certificate /data/ssl/nginx/cert/nxuc.com.crt;
    ssl_certificate_key /data/ssl/nginx/cert/nxuc.com.key;
    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}