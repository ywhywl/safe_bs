# ng3 - Web-NGINX2012 主配置
# 来源: ng3.png
# worker_processes 1, user nobody

user nobody;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;

    # 自定义转义配置
    log_escape_char '{' "%7C";
    log_escape_char '|0d' "%0D";
    log_escape_char '{' "%5C";
    log_escape_char '{' "%5C";

    log_format main '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|default|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format dispute_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|dispute|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format application_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|application|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format reserve_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|reserve|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format with_manager_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|with_manager|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format unionpay_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|unionpay|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';
    log_format file_log '$time_iso8601|$server_add|WEB-NGINX2012|$request_time|$status|$request_method|$request_length|file|$upstream_addr|$http_user_agent|$http_referer|$uri|$http_x_forwarded_for|$http_host|$remote_addr';

    log_format main escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_host|[2]WEB-NGINX|application';
    log_format dispute_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|dispute';
    log_format application_log escape=json '$remote_addr|$remote_user|[$time_iso8601]|$request_time|$request_method|$request_uri|[$status]|$body_bytes_sent|$http_referer|$http_user_agent|$http_x_forwarded_for|$scheme|$server_name|$server_add|$server_port|$upstream_addr|$upstream_response_time|$http_x_forwarded_host|[2]WEB-NGINX|application';
}